name: Deploy to Google Cloud - Southern Matter

on:
  push:
    branches:
      - staging
  workflow_dispatch: {}

env:
  GCP_PROJECT: southern-matter-117620
  GCP_REGION: us-south1

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest -q

  deploy:
    name: Build and deploy to Cloud Run
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Configure default region and platform
        run: |
          gcloud config set run/region $GCP_REGION
          gcloud config set run/platform managed

      - name: Build Docker image with Cloud Build
        run: |
          gcloud builds submit --tag gcr.io/southern-matter-117620/tai-yi-api:${{ github.sha }} .

      - name: Deploy to Cloud Run service
        run: |
          gcloud run deploy tai-yi-api \
            --image gcr.io/southern-matter-117620/tai-yi-api:${{ github.sha }} \
            --region $GCP_REGION \
            --platform managed \
            --allow-unauthenticated
